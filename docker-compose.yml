# Local Postgres for development
# Use: pnpm db:up / pnpm db:down
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bonusbridge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bonusbridge"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
